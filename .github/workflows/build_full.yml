name: Build Full

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or SHA to build
        required: true

jobs:
  build:
    name: Build / ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-22.04
            use_cross: true
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-22.04
            use_cross: true
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            use_cross: false
          - target: aarch64-apple-darwin
            runner: macos-15
            use_cross: false
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            use_cross: false
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.ref }}
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2.9.1
      - uses: taiki-e/install-action@v2.69.6
        if: matrix.use_cross
        with:
          tool: cross
      - run: cross build --release --target ${{ matrix.target }}
        if: matrix.use_cross
      - run: cargo build --release --target ${{ matrix.target }}
        if: ${{ !matrix.use_cross }}
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          sha=$(git rev-parse --short HEAD)
          bin="target/${{ matrix.target }}/release/arkana"
          archive="arkana-${version}-${sha}-${{ matrix.target }}.tar.gz"
          tar -czf "$archive" -C "$(dirname "$bin")" "$(basename "$bin")"
          echo "ASSET=$archive" >> "$GITHUB_ENV"
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version'
          $sha = git rev-parse --short HEAD
          $bin = "target/${{ matrix.target }}/release/arkana.exe"
          $archive = "arkana-${version}-${sha}-${{ matrix.target }}.zip"
          Compress-Archive -Path $bin -DestinationPath $archive
          echo "ASSET=$archive" >> $env:GITHUB_ENV
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ASSET }}
